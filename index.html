}

/* ---- export / import to a file (cross-device portability) ---- */
/* ---- shareable setlist links ----
   Encoded into the URL hash so links work with no backend. Songs are stored as
   3-char hex indices into SONGS (not full titles), which keeps links ~89%
   shorter. A short library fingerprint is included: if the song list changes
   enough that indices would shift, we detect it and fall back to a safe path
   instead of silently loading the wrong songs. */
const LIB_FP = (()=>{                       // cheap fingerprint of the library
  let h = SONGS.length;                      // length is the main thing that shifts indices
  for(let i=0;i<SONGS.length;i+=97){         // sample a few titles so reorders are caught too
    const s = SONGS[i].song || "";
    for(let j=0;j<s.length;j++) h = (h*31 + s.charCodeAt(j)) >>> 0;
  }
  return h.toString(36).slice(0,4);
})();

function encodeSetlistLink(sl){
  // v2 format:  <fp>~<encodedName>~<hexIndices>
  // the name is URI-encoded so a "~" inside it can't break the delimiters
  const idx = sl.songs.filter(id=>SONGS[id]).map(id=>id.toString(16).padStart(3,'0')).join('');
  // encodeURIComponent leaves "~" untouched, so escape it explicitly or it breaks the delimiter
  const safeName = encodeURIComponent(sl.name).replace(/~/g, '%7E');
  const raw = `${LIB_FP}~${safeName}~${idx}`;
  const b64 = btoa(unescape(encodeURIComponent(raw))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
  return location.origin + location.pathname + "#sl=" + b64;
}

function decodeSetlistLink(hash){
  try{
    let b64 = hash.replace(/^#?sl=/,'').replace(/-/g,'+').replace(/_/g,'/');
    while(b64.length % 4) b64 += '=';
    const raw = decodeURIComponent(escape(atob(b64)));

    // legacy v1 links were JSON with full "Title|Artist" strings — still supported
    if(raw.charAt(0)==='{'){
      const p = JSON.parse(raw);
      if(!p || !Array.isArray(p.s)) return null;
      return { name: p.n || "Shared setlist", pairs: p.s, legacy:true };
    }

    const parts = raw.split('~');
    if(parts.length < 3) return null;
    const fp = parts[0];
    let name = "";
    try{ name = decodeURIComponent(parts[1]); }catch(e){ name = parts[1]; }
    const idxStr = parts[2];
    const ids = [];
    for(let i=0; i+3<=idxStr.length; i+=3){
      const n = parseInt(idxStr.substr(i,3), 16);
      if(!isNaN(n)) ids.push(n);
    }
    return { name: name || "Shared setlist", ids, fpOk: (fp===LIB_FP) };
  }catch(e){ return null; }
}

// if the page was opened with a shared setlist link, offer to add it
function checkSharedSetlistLink(){
  if(!location.hash || location.hash.indexOf('sl=')<0) return;
  const payload = decodeSetlistLink(location.hash);
  if(!payload) return;

  let ids = [], missing = 0;

  if(payload.legacy){
    // old links stored titles — resolve them by name
    const norm=s=>String(s).toLowerCase().replace(/[^a-z0-9]/g,"");
    const index={};
    SONGS.forEach(s=>{ index[norm(s.song)+"|"+norm(s.artist)]=s._id; });
    payload.pairs.forEach(str=>{
      const parts=String(str).split("|");
      const id=index[norm(parts[0]||"")+"|"+norm(parts[1]||"")];
      if(id!=null && !ids.includes(id)) ids.push(id); else missing++;
    });
  } else {
    payload.ids.forEach(i=>{
      if(SONGS[i] && !ids.includes(i)) ids.push(i); else missing++;
    });
  }

  const name = payload.name;
  let msg = `"${name}" has ${ids.length} song${ids.length===1?'':'s'}${missing?` (${missing} not found in this library)`:''}. Add it to your setlists?`;
  if(payload.fpOk === false){
    msg = `"${name}" was shared from a different version of this song library, so some songs may not match. Add it anyway?`;
  }
  slConfirm("Shared setlist", msg).then(ok=>{
    // clear the hash either way so it doesn't re-prompt on refresh
    history.replaceState(null,"",location.pathname);
    if(!ok) return;
    const id=slNewId();
    setlists.push({id, name, songs:ids});
    activeSetlistId=id;
    saveSetlists();
    refreshAddButtons();
    switchTab('setlists');
  });
}

function shareSetlist(){
  const sl=activeSetlist();
  if(!sl || !sl.songs.length){ slConfirm("Nothing to share","Add some songs to this setlist first."); return; }
  const url=encodeSetlistLink(sl);
  // try the native share sheet first (nice on phones), fall back to copy
  if(navigator.share){
    navigator.share({title:sl.name, text:`Rock Band setlist: ${sl.name}`, url}).catch(()=>copyShareLink(url));
  } else {
    copyShareLink(url);
  }
}
function copyShareLink(url){
  const done=()=>{
    const btn=document.getElementById('slShare');
    if(btn){ const t=btn.textContent; btn.textContent="✓ Link copied"; setTimeout(()=>{ btn.textContent=t; },2000); }
  };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(url).then(done).catch(()=>promptCopy(url));
  } else promptCopy(url);
}
function promptCopy(url){
  // last resort: show the link so it can be copied manually
  slPrompt("Copy this link", url);
}

function exportSetlists(){
  // export by song title+artist so it survives even if song order/ids change
  const data={ version:1,
    setlists:setlists.map(sl=>({ name:sl.name, songs:sl.songs.map(id=>SONGS[id]).filter(Boolean).map(s=>({song:s.song, artist:s.artist})) })),
    liked: likedSongs.map(id=>SONGS[id]).filter(Boolean).map(s=>({song:s.song, artist:s.artist}))
  };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download="rockband-setlists.json"; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function importSetlists(){
  const inp=document.createElement('input'); inp.type="file"; inp.accept="application/json,.json";
  inp.onchange=()=>{
    const file=inp.files[0]; if(!file)return;
    const rd=new FileReader();
    rd.onload=()=>{
      try{
        const data=JSON.parse(rd.result);
        if(!data.setlists && !data.liked) throw 0;
        const norm=s=>({t:(s.song||"").toLowerCase().replace(/[^a-z0-9]/g,""), a:(s.artist||"").toLowerCase().replace(/[^a-z0-9]/g,"")});
        const index={};
        SONGS.forEach(s=>{ const n=norm(s); index[n.t+"|"+n.a]=s._id; });
        (data.setlists||[]).forEach(imp=>{
          const ids=[];
          (imp.songs||[]).forEach(x=>{ const n=norm(x); const id=index[n.t+"|"+n.a]; if(id!=null && !ids.includes(id)) ids.push(id); });
          const id=slNewId();
          setlists.push({id, name:(imp.name||"Imported")+"", songs:ids});
          activeSetlistId=id;
        });
        if(data.liked){
          (data.liked).forEach(x=>{ const n=norm(x); const id=index[n.t+"|"+n.a]; if(id!=null && !likedSongs.includes(id)) likedSongs.push(id); });
          saveLiked();
        }
        saveSetlists(); renderSetlists(); refreshAddButtons();
        alert("Import complete.");
      }catch(e){ alert("That file couldn't be read as a setlist export."); }
    };
    rd.readAsText(file);
  };
  inp.click();
}

loadSetlists();

// ---- offline awareness: explain missing covers, and don't burn lookups while offline
let queueReady = false;   // set true once the fetch-queue variables below are initialized
function updateOnlineState(){
  const el=document.getElementById('offlineNotice');
  const off = (navigator.onLine === false);
  if(el) el.style.display = off ? '' : 'none';
  // NOTE: pumpQueue() touches `inFlight` etc., which are declared further down.
  // Calling it before those initialize throws a TDZ ReferenceError and kills the
  // whole script, so only resume once the queue is actually ready.
  if(!off && queueReady){ pumpQueue(); }
}
window.addEventListener('online', updateOnlineState);
window.addEventListener('offline', updateOnlineState);

// faint corner control: clear cover caches and re-fetch
(function(){

checkSharedSetlistLink();   // handle ?#sl= shared setlist links

/* Background cover pre-fetch. Apple rate-limits the iTunes Search API to
   ~20 calls/minute per IP, so we go SLOW and deliberate: one request at a
   time, spaced ~3.2s apart (≈18/min, safely under the cap). Going faster
   triggers 429 errors that make covers fail to load — the opposite of what
   we want. Covers you scroll to or open jump the queue so they load first.
   (Cache is per-session — browser storage isn't available inside this file.) */
const RATE_MS = 3300;              // ~18 requests/minute
/* Adaptive iTunes backoff.
   Apple hard-blocks a client that overruns its limit — every request then
   fails in ~50ms. Retrying through that just keeps the queue "busy" for
   minutes producing nothing, which is what made covers seem stuck. Track
   consecutive failures and pause iTunes entirely for a while instead;
   Deezer is unaffected and keeps supplying covers meanwhile. */
let itunesFailStreak = 0;
let itunesPausedUntil = 0;
function noteItunesFailure(){
  itunesFailStreak++;
  if(itunesFailStreak >= 4){
    // exponential-ish pause: 1min, 2min, 4min... capped at 10min
    const mins = Math.min(10, Math.pow(2, Math.min(3, itunesFailStreak - 4)));
    itunesPausedUntil = Date.now() + mins*60*1000;
  }
}
function noteItunesSuccess(){ itunesFailStreak = 0; itunesPausedUntil = 0; }
function itunesAvailable(){ return Date.now() >= itunesPausedUntil; }
let lastCall = 0;
let inFlight = false;
const priorityQueue = [];          // songs the user is looking at now
const queuedKeys = new Set();      // avoid queuing the same song twice
let bgIdx = 0;                     // background sweep position
let interactingUntil = 0;          // pause the BACKGROUND sweep while the user is busy

function markInteracting(){ interactingUntil = Date.now() + 700; }

function nextToFetch(){
  // user-priority items always go, even while interacting
  while(priorityQueue.length){
    const s = priorityQueue.shift();
    queuedKeys.delete(artKey(s));
    if(!(artKey(s) in artCache)) return s;
  }
  // iTunes retries (transient failures) — paced through this same queue.
  // Skip them entirely while Apple is blocking us: grinding through a backlog
  // at RATE_MS each just keeps the queue busy for minutes achieving nothing.
  if(itunesAvailable()){
    while(itunesRetryQueue.length){
      const job = itunesRetryQueue.shift();
      const e = artCache[job.key];
      if(e && !e.itunes){ return {__retry:true, song:job.song, key:job.key}; }
    }
  }
  // hold off the background sweep briefly while the user scrolls / views a song
  if(Date.now() < interactingUntil) return null;
  while(bgIdx < SONGS.length){
    const s = SONGS[bgIdx++];
    if(!(artKey(s) in artCache)) return s;
  }
  return null;
}

function pumpQueue(){
  if(inFlight) return;
  // NOTE: deliberately not gating on navigator.onLine here. It reports false
  // negatives in some browsers/webviews, which would silently block every
  // cover lookup forever. If we really are offline the request just fails
  // harmlessly and the normal retry path handles it.
  // If iTunes is in a backoff there's no point running this slow queue at all;
  // the fast Deezer sweep keeps covers coming in the meantime.
  if(!itunesAvailable()){ setTimeout(pumpQueue, 5000); return; }
  const song = nextToFetch();
  if(!song){
    // nothing to do now; if a background sweep remains, re-check shortly
    if(bgIdx < SONGS.length) setTimeout(pumpQueue, 800);
    return;
  }
  const wait = Math.max(0, RATE_MS - (Date.now() - lastCall));
  inFlight = true;
  let settled = false;
  const done = ()=>{ if(settled) return; settled=true; inFlight=false; pumpQueue(); };
  setTimeout(()=>{
    lastCall = Date.now();
    if(song.__retry){
      // iTunes-only retry (Deezer already resolved); resolves via recordArt/recordArtFail
      const before = artCache[song.key] ? artCache[song.key].itunes : null;
      runLookup(song.song, song.key, 0);
      // we can't await runLookup directly; give it the standard window then continue
      setTimeout(done, 9000);
    } else {
      fetchArt(song).then(done).catch(done);
      // hard safety net: never let a single lookup freeze the queue for >12s
      setTimeout(done, 12000);
    }
  }, wait);
}

// let visible / opened covers cut the line (deduped, priority bypasses the pause)
function prioritize(song){
  const k = artKey(song);
  if(k in artCache) return;
  if(queuedKeys.has(k)) { pumpQueue(); return; }
  queuedKeys.add(k);
  priorityQueue.push(song);
  pumpQueue();
}

// pause the background sweep briefly during active scrolling
window.addEventListener('scroll', ()=>{ markInteracting(); }, {passive:true});

// kick off the slow background sweep after initial paint
queueReady = true;              // queue vars above are now initialized; safe to pump
setTimeout(pumpQueue, 1500);

/* ---- Fast Deezer prefetch sweep ------------------------------------------
   The main pumpQueue is paced for iTunes' strict ~20/min limit, which means a
   full sweep of the library takes ~35 minutes — far too slow to stay ahead of
   scrolling, so covers pop in late and flicker from placeholder to art.
   Deezer's limit is far more generous (~50 req / 5s), so we sweep it on its
   own timer. Deezer supplies the cover fast; iTunes still upgrades it later
   via the existing queue. This does NOT touch the iTunes rate budget. */
const DZ_SWEEP_BATCH = 10;     // songs queued per tick
const DZ_SWEEP_MS = 700;       // tick interval — measured: Deezer handles this
                               // comfortably (8 rapid calls at 150ms, 0 failures,
                               // ~250ms each), and it's the source that actually
                               // delivers when iTunes is throttling us.
let dzSweepIdx = 0;
function dzSweep(){
  if(navigator.onLine === false) return;          // don't burn lookups offline
  // don't compete with the user's own scrolling burst
  if(dzQueue.length > 24) return;
  let queued = 0;
  while(dzSweepIdx < SONGS.length && queued < DZ_SWEEP_BATCH){
    const s = SONGS[dzSweepIdx++];
    const k = artKey(s);
    const e = artCache[k];
    // skip anything already resolved or already in flight
    if(e && (e.itunes || e.deezer || e.deezer==="")) continue;
    if(!e) artCache[k] = { itunes:null, deezer:null };
    deezerLookup(s, k);
    queued++;
  }
  if(dzSweepIdx >= SONGS.length) clearInterval(dzSweepTimer);
}
const dzSweepTimer = setInterval(dzSweep, DZ_SWEEP_MS);
setTimeout(dzSweep, 800);
// Genre/year auto-fill is retained for future songs added from a new CSV export,
// but every song currently has a genre and year baked in, so there's nothing to
// do on load. Call pumpGenre() manually if you ever add songs missing that data.
