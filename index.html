<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find Your Song — Rock Band Song Search</title>
<!-- Icons.
     Tab/favicon uses the simple pick mark — the drum kit has too much detail
     to survive 16-32px. The full drum-kit icon is used everywhere it's shown
     large (iPhone home screen, PWA install, link previews). -->
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/svg+xml" href="/icon-mark.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="manifest" href="/site.webmanifest">
<!-- iOS: allow full-screen standalone mode when saved to home screen -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="description" content="Search every song installed across the Rock Band library. Browse by game, genre, and difficulty, then build and share setlists.">
<meta name="theme-color" content="#0a0b0f">
<meta name="application-name" content="Find Your Song">
<meta name="apple-mobile-web-app-title" content="Find Your Song">
<!-- Link previews (messaging apps, social) — matters because setlists are shared as links -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="Find Your Song">
<meta property="og:title" content="Find Your Song — Rock Band Song Search">
<meta property="og:description" content="Search every song installed across the Rock Band library. Browse by game, genre, and difficulty, then build and share setlists.">
<meta property="og:image" content="/og-image.png">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Find Your Song — Rock Band Song Search">
<meta name="twitter:description" content="Search every song installed across the Rock Band library. Browse by game, genre, and difficulty, then build and share setlists.">
<meta name="twitter:image" content="/og-image.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:ital,wght@0,400;0,500;0,600;0,700;1,600&family=Archivo+Black&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0b0f; --bg-raised:#14161d; --bg-card:#1b1e27; --hairline:#2a2e3a;
    --gold:#f2b705; --gold-dim:#8a6a10; --text:#ede9e0; --text-dim:#9aa0ac;
    --guitar:#ff8a3d; --bass:#7c5cff; --drums:#ff3d5a; --vocals:#ff4fa3; --keys:#35d0ba;
    --RB1:#3ecf5a; --RB2:#ff3d5a; --RB3:#f2c811; --LEGO:#3b9dff; --TBRB:#ff8a3d;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:radial-gradient(ellipse 900px 500px at 50% -10%, rgba(242,183,5,0.16), transparent 60%), var(--bg); color:var(--text); font-family:'Inter',sans-serif; min-height:100vh; font-size:17px;}
  /* faint reload-covers control, tucked in the corner */
  #reloadCovers{position:fixed; top:10px; right:12px; z-index:50; width:28px; height:28px; padding:0;
    border:none; background:transparent; color:var(--text-dim); opacity:0.28; font-size:16px; line-height:28px;
    text-align:center; cursor:pointer; border-radius:6px; transition:opacity .15s, color .15s; -webkit-tap-highlight-color:transparent;}
  #reloadCovers:hover{opacity:0.85; color:var(--text);}
  #reloadCovers.spinning{animation:rcSpin .8s linear infinite; opacity:0.85;}
  @keyframes rcSpin{from{transform:rotate(0)} to{transform:rotate(360deg)}}
  ::selection{background:var(--gold); color:#0a0b0f;}
  .wrap{max-width:1240px; margin:0 auto; padding:0 24px 90px;}
  .hero{padding:56px 24px 28px; text-align:center;}
  .hero .eyebrow{font-family:'Archivo','Inter',sans-serif; font-size:13px; letter-spacing:0.2em; color:var(--gold); text-transform:uppercase; margin:0 0 14px;}
  .hero h1{font-family:'Anton',sans-serif; font-weight:400; font-size:clamp(52px,9vw,104px); letter-spacing:0.02em; line-height:0.95; margin:0; text-shadow:0 0 40px rgba(242,183,5,0.35), 0 0 2px rgba(242,183,5,0.6);}
  .hero h1 .hl-find{color:var(--RB1); text-shadow:0 0 40px color-mix(in srgb, var(--RB1) 45%, transparent), 0 0 2px color-mix(in srgb, var(--RB1) 60%, transparent);}
  .hero h1 .hl-song{color:var(--LEGO); text-shadow:0 0 40px color-mix(in srgb, var(--LEGO) 45%, transparent), 0 0 2px color-mix(in srgb, var(--LEGO) 60%, transparent);}
  .hero h1 .hl-your{color:var(--RB3); text-shadow:0 0 40px color-mix(in srgb, var(--RB3) 45%, transparent), 0 0 2px color-mix(in srgb, var(--RB3) 60%, transparent);}
  .hero p.sub{color:var(--text-dim); font-size:16px; max-width:560px; margin:16px auto 0; line-height:1.5;}
  .hero .count{font-family:'Archivo','Inter',sans-serif; color:var(--gold); font-weight:600;}
  .search-panel{background:var(--bg-raised); border:1px solid var(--hairline); border-radius:14px; padding:20px;}

  /* ---- active setlist selector in browse ---- */
  .active-sl-bar{display:flex; align-items:center; gap:10px; margin-top:16px; padding-top:16px; border-top:1px solid var(--hairline);}
  .active-sl-label{font-family:'Archivo','Inter',sans-serif; font-size:14px; font-weight:600; color:var(--text-dim); white-space:nowrap;}
  .active-sl-select{flex:1; min-width:0; background:var(--bg-card); border:1px solid var(--hairline); color:var(--text); font-family:'Archivo','Inter',sans-serif; font-size:15px; font-weight:600; padding:9px 12px; border-radius:9px; outline:none; cursor:pointer;}
  .active-sl-select:focus{border-color:var(--gold-dim);}
  .active-sl-new{font-family:'Archivo','Inter',sans-serif; font-weight:700; font-size:14px; padding:9px 14px; border-radius:9px; border:1px solid var(--hairline); background:var(--bg-card); color:var(--text-dim); cursor:pointer; white-space:nowrap; transition:all .12s;}
  .active-sl-new:hover{color:var(--gold); border-color:var(--gold-dim);}

  /* ---- tabs ---- */
  .tabs{max-width:1240px; margin:0 auto 6px; padding:0 24px; display:flex; gap:8px;}
  .tab-btn{font-family:'Archivo','Inter',sans-serif; font-weight:700; font-size:15px; padding:12px 22px; border-radius:11px 11px 0 0; border:1px solid var(--hairline); border-bottom:none; background:var(--bg-raised); color:var(--text-dim); cursor:pointer; transition:color .12s, background .12s; display:flex; align-items:center; gap:8px;}
  .tab-btn.active{color:var(--gold); background:var(--bg-card);}
  .tab-btn:hover{color:var(--text);}
  .tab-count{font-size:12px; background:var(--gold); color:#0a0b0f; border-radius:999px; padding:1px 8px; font-weight:700;}
  .tab-count:empty{display:none;}
  .offline-notice{max-width:1240px; margin:0 auto 10px; padding:10px 18px; background:color-mix(in srgb, var(--RB3) 12%, var(--bg-raised)); border:1px solid color-mix(in srgb, var(--RB3) 45%, transparent); border-radius:10px; color:var(--RB3); font-family:'Archivo','Inter',sans-serif; font-size:13px; font-weight:600;}
  @media (max-width:820px){ .offline-notice{margin:0 24px 10px;} }

  /* ---- add-to-setlist button on rows ---- */
  .add-btn{font-family:'Archivo','Inter',sans-serif; font-weight:700; font-size:13px; padding:7px 12px; border-radius:8px; border:1px solid var(--hairline); background:var(--bg-card); color:var(--text-dim); cursor:pointer; white-space:nowrap; transition:all .12s;}
  .add-btn:hover{color:var(--gold); border-color:var(--gold-dim);}
  .add-btn.added{color:#0a0b0f; background:var(--RB1); border-color:transparent;}
  td.action-cell{width:1%; white-space:nowrap; vertical-align:middle;}
  .action-stack{display:flex; flex-direction:column; gap:6px; align-items:stretch;}
  .action-stack .like-btn, .action-stack .add-btn{width:100%; text-align:center;}
  .card-actions{display:flex; flex-direction:column; gap:8px; align-items:stretch; margin-top:12px; max-width:160px;}
  .card-actions .like-btn, .card-actions .add-btn{width:100%; text-align:center;}
  .like-btn{font-family:'Archivo','Inter',sans-serif; line-height:1; padding:6px 11px; border-radius:8px; border:1px solid var(--hairline); background:var(--bg-card); cursor:pointer; transition:all .12s; display:inline-flex; align-items:center; justify-content:center;}
  .like-btn:hover{border-color:var(--vocals);}
  .like-btn.liked{border-color:var(--vocals);}
  /* SVG heart: outline by default, fills solid when liked/active */
  .heart-svg{width:22px; height:22px; display:block; fill:none; stroke:var(--vocals); stroke-width:2; transition:fill .12s, stroke .12s;}
  .like-btn .heart-svg{stroke:var(--text-dim);}
  .like-btn:hover .heart-svg{stroke:var(--vocals);}
  .like-btn.liked .heart-svg{fill:var(--vocals); stroke:var(--vocals);}
  .liked-toggle{font-family:'Archivo Black','Anton',sans-serif; font-style:italic; font-size:13px; letter-spacing:-0.02em; padding:7px 12px; border-radius:8px; border:1px solid var(--hairline); background:var(--bg-card); color:#fff; cursor:pointer; transition:all .12s; -webkit-text-stroke:1.1px #000; paint-order:stroke fill; display:flex; align-items:center; gap:5px;}
  .liked-toggle .lt-icon{width:15px; height:15px; fill:none; stroke:#fff; stroke-width:2.5; flex-shrink:0; transition:fill .12s, stroke .12s; paint-order:stroke fill;}
  .liked-toggle[data-active="true"] .lt-icon{fill:#fff; stroke:#000;}
  .liked-toggle:hover{border-color:var(--vocals);}
  .liked-toggle[data-active="true"]{color:#fff; background:var(--vocals); border-color:transparent; box-shadow:0 0 10px color-mix(in srgb, var(--vocals) 55%, transparent), 0 0 20px color-mix(in srgb, var(--vocals) 28%, transparent);}

  /* ---- setlist view ---- */
  .sl-toolbar{display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin-bottom:20px;}
  .sl-select{flex:1; min-width:180px; background:var(--bg-card); border:1px solid var(--hairline); color:var(--text); font-family:'Archivo','Inter',sans-serif; font-size:16px; font-weight:600; padding:12px 14px; border-radius:10px; outline:none; cursor:pointer;}
  .sl-btn{font-family:'Archivo','Inter',sans-serif; font-weight:700; font-size:14px; padding:12px 16px; border-radius:10px; border:1px solid var(--hairline); background:var(--bg-card); color:var(--text); cursor:pointer; transition:all .12s; white-space:nowrap;}
  .sl-btn:hover{border-color:var(--gold-dim); color:var(--gold);}
  .sl-btn.primary{background:var(--gold); color:#0a0b0f; border-color:transparent;}
  .sl-btn.primary:hover{background:#ffc720; color:#0a0b0f;}
  .sl-btn.danger:hover{border-color:var(--RB2); color:var(--RB2);}
  .sl-stats{display:flex; flex-wrap:wrap; gap:8px 18px; margin-bottom:18px; color:var(--text-dim); font-size:14px; font-family:'Archivo','Inter',sans-serif;}
  .sl-stats b{color:var(--text);}
  .sl-item{display:flex; gap:14px; align-items:center; background:var(--bg-raised); border:1px solid var(--hairline); border-radius:11px; padding:12px 14px; margin-bottom:8px;}
  .sl-item.dragging{opacity:0.45;}
  .sl-item.drop-above{box-shadow:0 -3px 0 0 var(--gold);}
  .sl-item.drop-below{box-shadow:0 3px 0 0 var(--gold);}
  .sl-grip{color:var(--text-dim); font-size:16px; cursor:grab; flex-shrink:0; line-height:1; user-select:none;}
  .sl-grip:active{cursor:grabbing;}
  .sl-num{font-family:'Archivo','Inter',sans-serif; font-weight:700; font-size:15px; color:var(--text-dim); width:26px; text-align:center; flex-shrink:0;}
  .sl-cover, .sl-cover-ph{width:52px; height:52px; border-radius:7px; flex-shrink:0; object-fit:cover; border:1px solid var(--hairline);}
  .sl-cover-ph{display:flex; align-items:center; justify-content:center; font-family:'Anton',sans-serif; font-size:20px; color:#0a0b0f;}
  .sl-info{flex:1; min-width:0;}
  .sl-info .t{font-weight:700; font-size:16px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .sl-info .a{color:var(--text-dim); font-size:14px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .sl-badges{display:flex; gap:4px; flex-shrink:0;}
  .sl-move{display:flex; flex-direction:column; gap:2px; flex-shrink:0;}
  .sl-move button, .sl-remove{background:var(--bg-card); border:1px solid var(--hairline); color:var(--text-dim); border-radius:6px; cursor:pointer; font-size:13px; line-height:1; padding:4px 8px; transition:all .12s;}
  .sl-move button:hover{color:var(--gold); border-color:var(--gold-dim);}
  .sl-remove{flex-shrink:0; padding:8px 11px; font-size:15px;}
  .sl-remove:hover{color:var(--RB2); border-color:var(--RB2);}
  .sl-empty{text-align:center; padding:60px 24px; color:var(--text-dim);}
  .sl-empty .big{font-family:'Anton',sans-serif; font-size:26px; color:var(--text); margin-bottom:10px;}
  @media (max-width:600px){ .sl-cover,.sl-cover-ph{width:44px;height:44px;} .sl-badges{display:none;} }

  /* ---- inline setlist modal (replaces browser prompt/confirm) ---- */
  .sl-modal-overlay{position:fixed; inset:0; background:rgba(6,7,10,0.75); z-index:200; display:none; align-items:center; justify-content:center; padding:24px;}
  .sl-modal-overlay.open{display:flex;}
  .sl-modal{background:var(--bg-raised); border:1px solid var(--hairline); border-radius:16px; padding:26px; width:100%; max-width:420px; box-shadow:0 24px 60px rgba(0,0,0,0.5); animation:rise .2s ease;}
  .sl-modal-title{font-family:'Archivo','Inter',sans-serif; font-weight:700; font-size:19px; color:var(--text); margin-bottom:16px;}
  .sl-modal-input{width:100%; background:var(--bg); border:1px solid var(--hairline); color:var(--text); font-family:'Archivo','Inter',sans-serif; font-size:16px; padding:12px 14px; border-radius:10px; outline:none; margin-bottom:6px;}
  .sl-modal-input:focus{border-color:var(--gold-dim); box-shadow:0 0 0 3px rgba(242,183,5,0.12);}
  .sl-modal-input.hidden{display:none;}
  .sl-modal-msg{color:var(--text-dim); font-size:14px; line-height:1.5; margin-bottom:8px;}
  .sl-modal-msg:empty{display:none; margin:0;}
  .sl-modal-actions{display:flex; gap:10px; justify-content:flex-end; margin-top:18px;}
  .search-row{display:flex; gap:12px; align-items:center;}
  .search-row input[type="text"]{flex:1; min-width:0; background:var(--bg); border:1px solid var(--hairline); border-radius:10px; padding:16px 18px; color:var(--text); font-size:18px; font-family:'Inter',sans-serif; outline:none; transition:border-color .15s, box-shadow .15s;}
  .search-row input[type="text"]:focus{border-color:var(--gold-dim); box-shadow:0 0 0 3px rgba(242,183,5,0.12);}
  .random-btn{font-family:'Archivo','Inter',sans-serif; font-size:14px; font-weight:600; letter-spacing:0.04em; padding:16px 20px; border-radius:10px; border:none; background:var(--gold); color:#0a0b0f; cursor:pointer; white-space:nowrap; transition:transform .1s, background .15s, box-shadow .15s; display:flex; align-items:center; gap:8px; box-shadow:0 0 10px color-mix(in srgb, var(--gold) 50%, transparent), 0 0 20px color-mix(in srgb, var(--gold) 25%, transparent);}
  .random-btn:hover{box-shadow:0 0 14px color-mix(in srgb, var(--gold) 65%, transparent), 0 0 26px color-mix(in srgb, var(--gold) 35%, transparent);}
  .random-btn:hover{background:#ffc720;} .random-btn:active{transform:scale(0.96);}
  .search-row .badge{font-family:'Archivo','Inter',sans-serif; font-size:12px; color:var(--text-dim); border:1px solid var(--hairline); border-radius:6px; padding:6px 9px; white-space:nowrap;}
  .filters{display:flex; flex-wrap:wrap; gap:8px; margin-top:16px; align-items:center;}
  .game-chip{font-family:'Archivo Black','Anton',sans-serif; font-style:italic; font-size:13px; letter-spacing:-0.02em; padding:7px 12px; border-radius:8px; border:1px solid var(--hairline); background:var(--bg-card); color:#fff; cursor:pointer; transition:all .12s; -webkit-text-stroke:1.1px #000; paint-order:stroke fill;}
  .game-chip[data-active="true"]{color:#fff; border-color:transparent;}
  .chip-short{display:none;}
  .chip-full{display:inline;}
  /* On narrow screens, swap full names for short codes so chips stay on one row */
  @media (max-width:680px){
    .chip-full{display:none;}
    .chip-short{display:inline;}
  }
  .game-chip[data-active="true"][data-game="RB1"]{background:var(--RB1); box-shadow:0 0 10px color-mix(in srgb, var(--RB1) 55%, transparent), 0 0 20px color-mix(in srgb, var(--RB1) 28%, transparent);}
  .game-chip[data-active="true"][data-game="RB2"]{background:var(--RB2); box-shadow:0 0 10px color-mix(in srgb, var(--RB2) 55%, transparent), 0 0 20px color-mix(in srgb, var(--RB2) 28%, transparent);}
  .game-chip[data-active="true"][data-game="RB3"]{background:var(--RB3); box-shadow:0 0 10px color-mix(in srgb, var(--RB3) 55%, transparent), 0 0 20px color-mix(in srgb, var(--RB3) 28%, transparent);}
  .game-chip[data-active="true"][data-game="LEGO"]{background:var(--LEGO); box-shadow:0 0 10px color-mix(in srgb, var(--LEGO) 55%, transparent), 0 0 20px color-mix(in srgb, var(--LEGO) 28%, transparent);}
  .game-chip[data-active="true"][data-game="TBRB"]{background:var(--TBRB); box-shadow:0 0 10px color-mix(in srgb, var(--TBRB) 55%, transparent), 0 0 20px color-mix(in srgb, var(--TBRB) 28%, transparent);}
  .filters select{background:var(--bg-card); border:1px solid var(--hairline); color:var(--text); font-family:'Inter',sans-serif; font-size:13px; padding:8px 11px; border-radius:8px; outline:none; cursor:pointer;}
  .filters .clear-btn{background:none; border:1px solid var(--hairline); color:var(--text-dim); font-family:'Inter',sans-serif; font-size:13px; padding:8px 12px; border-radius:8px; cursor:pointer;}
  .filters .clear-btn:hover{color:var(--gold); border-color:var(--gold-dim);}
  .results-meta{display:flex; justify-content:space-between; align-items:baseline; margin:28px 4px 14px; color:var(--text-dim); font-size:14px; font-family:'Archivo','Inter',sans-serif;}
  table{width:100%; border-collapse:collapse;}
  thead th{text-align:left; font-family:'Archivo','Inter',sans-serif; font-size:12px; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-dim); font-weight:600; padding:12px; border-bottom:1px solid var(--hairline); cursor:pointer; user-select:none; white-space:nowrap;}
  thead th:hover{color:var(--gold);} thead th.active{color:var(--gold);}
  thead th.noclick{cursor:default;} thead th.noclick:hover{color:var(--text-dim);}
  tbody tr{border-bottom:1px solid var(--hairline); transition:background .1s; cursor:pointer;}
  tbody tr:hover{background:var(--bg-card);}
  tbody td{padding:15px 12px; font-size:18px; vertical-align:middle;}
  td.title-cell{font-weight:600; font-size:19px;} td.sub-cell{color:var(--text-dim); font-size:16px;}
  td.mono{font-family:'Archivo','Inter',sans-serif; color:var(--text-dim); font-size:14px;}
  .cover{width:84px; height:84px; border-radius:9px; object-fit:cover; background:var(--bg-card); display:block; border:1px solid var(--hairline); animation:coverFade .28s ease-in;}
  @keyframes coverFade{ from{opacity:0} to{opacity:1} }
  .sl-cover{animation:coverFade .28s ease-in;}
  .cover-ph{width:84px; height:84px; border-radius:9px; display:flex; align-items:center; justify-content:center; font-family:'Anton',sans-serif; font-size:34px; color:#0a0b0f; border:1px solid var(--hairline);}
  .gems{display:inline-flex; gap:3px; vertical-align:middle;}
  .gem{width:9px; height:9px; border-radius:2px; transform:rotate(45deg); background:var(--hairline);}
  .gem.filled{background:var(--gem-color,var(--gold));}
  .instr-label{font-family:'Archivo','Inter',sans-serif; font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.04em; width:64px; min-width:64px; display:inline-block; white-space:nowrap;}
  .instr-row{display:flex; align-items:center; gap:7px; margin-bottom:4px;}
  .instr-row:last-child{margin-bottom:0;}
  .game-badges{display:flex; flex-wrap:wrap; gap:6px;}
  .game-badge{font-family:'Archivo Black','Anton',sans-serif; font-style:italic; font-size:14px; letter-spacing:-0.02em; padding:2px 9px; color:var(--bc); -webkit-text-stroke:1.5px #000; paint-order:stroke fill; text-shadow:0 0 6px color-mix(in srgb, var(--bc) 55%, transparent), 0 0 12px color-mix(in srgb, var(--bc) 30%, transparent);}
  .cards{display:none;}
  .card{background:var(--bg-raised); border:1px solid var(--hairline); border-radius:12px; padding:18px; margin-bottom:12px; cursor:pointer; transition:border-color .12s; display:flex; gap:18px; align-items:flex-start;}
  .card:hover{border-color:var(--gold-dim);}
  .card .cover, .card .cover-ph{width:130px; height:130px; flex-shrink:0;}
  .card .cover-ph{font-size:52px;}
  .card .card-body{flex:1; min-width:0;}
  .card .title{font-weight:700; font-size:22px; margin-bottom:4px; line-height:1.15;}
  .card .artist{color:var(--text-dim); font-size:17px;}
  .card .meta-row{display:flex; flex-wrap:wrap; gap:6px 14px; font-size:13px; color:var(--text-dim); margin:8px 0 0; font-family:'Archivo','Inter',sans-serif;}
  .card .badges-wrap{margin:12px 0;}
  .card .instruments{border-top:1px solid var(--hairline); padding-top:12px;}
  @media (max-width:820px){
    table{display:none;} .cards{display:block;}
    .results-meta{flex-direction:column; align-items:flex-start; gap:6px;}
    /* Hiding the "Random" label leaves the button too wide with a stale flex gap,
       which pushed the dice off-centre. Make it a proper square icon button. */
    .random-btn span.lbl{display:none;}
    .random-btn{padding:0; gap:0; width:52px; height:52px; flex:0 0 52px; justify-content:center; font-size:20px;}
  }
  @media (max-width:440px){ .card .cover, .card .cover-ph{width:96px; height:96px;} .card .cover-ph{font-size:40px;} .card{gap:14px; padding:14px;} }
  .empty{text-align:center; padding:70px 24px; color:var(--text-dim);}
  .empty .big{font-family:'Anton',sans-serif; font-size:30px; color:var(--text); margin-bottom:10px; letter-spacing:0.02em;}
  footer{text-align:center; padding:30px 24px; color:var(--text-dim); font-size:13px; font-family:'Archivo','Inter',sans-serif; border-top:1px solid var(--hairline); margin-top:40px; line-height:1.7;}

  /* ---------- DETAIL / LANDING PAGE ---------- */
  .detail-overlay{position:fixed; inset:0; background:rgba(6,7,10,0.92); z-index:100; display:none; overflow-y:auto; padding:40px 20px;}
  .detail-overlay.open{display:block;}
  .detail{max-width:860px; margin:0 auto; background:linear-gradient(180deg, var(--bg-raised), var(--bg)); border:1px solid var(--hairline); border-radius:20px; overflow:hidden; box-shadow:0 30px 80px rgba(0,0,0,0.6); animation:rise .28s cubic-bezier(.2,.7,.3,1);}
  @keyframes rise{from{opacity:0; transform:translateY(24px) scale(0.98);} to{opacity:1; transform:none;}}
  .detail-banner{position:relative; padding:38px 38px 30px; display:flex; gap:30px; align-items:flex-end; overflow:hidden;}
  .detail-banner-bg{position:absolute; inset:0; background-size:cover; background-position:center; filter:blur(18px) saturate(1.3); opacity:0.28; transform:scale(1.12); z-index:0; will-change:transform; contain:paint;}
  .detail-banner-bg::after{content:""; position:absolute; inset:0; background:linear-gradient(180deg, rgba(10,11,15,0.3), var(--bg-raised) 96%);}
  .detail-cover, .detail-cover-ph{position:relative; z-index:1; width:180px; height:180px; border-radius:14px; flex-shrink:0; box-shadow:0 16px 40px rgba(0,0,0,0.5); border:1px solid rgba(255,255,255,0.08);}
  .detail-cover{object-fit:cover;}
  .detail-cover-ph{display:flex; align-items:center; justify-content:center; font-family:'Anton',sans-serif; font-size:80px; color:#0a0b0f;}
  .detail-titles{position:relative; z-index:1; min-width:0;}
  .detail-titles .eyebrow{font-family:'Archivo','Inter',sans-serif; font-size:12px; letter-spacing:0.16em; text-transform:uppercase; color:var(--gold); margin-bottom:10px;}
  .detail-titles h2{font-family:'Anton',sans-serif; font-weight:400; font-size:clamp(30px,5vw,50px); line-height:1.02; margin:0 0 8px; letter-spacing:0.01em;}
  .detail-titles .artist{font-size:20px; color:var(--text-dim); font-weight:500;}
  .detail-body{padding:28px 38px 40px; position:relative; z-index:1;}
  .detail-badges{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:26px;}
  .detail-section-label{font-family:'Archivo','Inter',sans-serif; font-size:12px; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-dim); margin:0 0 14px;}
  .meta-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:14px; margin-bottom:30px;}
  .meta-item{background:var(--bg-card); border:1px solid var(--hairline); border-radius:10px; padding:14px 16px;}
  .meta-item .k{font-family:'Archivo','Inter',sans-serif; font-size:11px; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-dim); margin-bottom:6px;}
  .meta-item .v{font-size:16px; font-weight:600;}
  .diff-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); gap:14px;}
  .diff-card{background:var(--bg-card); border:1px solid var(--hairline); border-radius:10px; padding:16px;}
  .diff-card .dc-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;}
  .diff-card .dc-name{font-weight:700; font-size:15px;}
  .diff-card .dc-num{font-family:'Archivo','Inter',sans-serif; font-size:13px; color:var(--text-dim);}
  .diff-card .dc-bar{display:flex; gap:4px;}
  .dc-pip{height:12px; flex:1; border-radius:3px; background:var(--hairline);}
  .dc-pip.on{background:var(--dc-color);}
  .diff-card.na{opacity:0.4;}
  .diff-card.na .dc-num{color:var(--text-dim);}
  .detail-close{position:fixed; top:22px; right:26px; z-index:110; width:44px; height:44px; border-radius:50%; border:1px solid var(--hairline); background:var(--bg-raised); color:var(--text); font-size:22px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .15s, border-color .15s;}
  .detail-close:hover{background:var(--bg-card); border-color:var(--gold-dim); color:var(--gold);}
  .detail-nav{display:flex; gap:12px; margin-top:34px; padding-top:24px; border-top:1px solid var(--hairline);}
  .detail-nav button{flex:1; padding:14px; border-radius:10px; border:1px solid var(--hairline); background:var(--bg-card); color:var(--text); font-family:'Inter',sans-serif; font-size:14px; font-weight:600; cursor:pointer; transition:border-color .12s, color .12s;}
  .detail-nav button:hover{border-color:var(--gold-dim); color:var(--gold);}
  .detail-nav button.rand{background:var(--gold); color:#0a0b0f; border-color:transparent;}
  .detail-nav button.rand:hover{background:#ffc720; color:#0a0b0f;}
  @media (max-width:640px){
    .detail-banner{flex-direction:column; align-items:flex-start; gap:20px; padding:28px 22px 22px;}
    .detail-cover,.detail-cover-ph{width:140px; height:140px;}
    .detail-body{padding:22px 22px 32px;}
    .detail-nav{flex-direction:column;}
  }
</style>
</head>

/* ---------- album art via iTunes Search API (JSONP, cached) ---------- */
/* Cover-art cache, persisted to localStorage so covers appear instantly on
   return visits instead of re-running rate-limited API lookups every time.
   Stored shape: { "<artist> <song>": {i:"<itunesUrl>", d:"<deezerUrl>", t:<savedMs>} }
   Entries expire after ART_TTL so covers can refresh/improve occasionally. */
const ART_STORAGE_KEY = "rbArtCache_v2";   // v2: v1 could store divergent row/card urls; start clean
const ART_STORAGE_KEY_OLD = "rbArtCache_v1";
const ART_TTL = 1000*60*60*24*30;   // 30 days
const artCache = {};       // key -> {itunes, deezer, itunesFailed}
const artWaiters = {};
let artSaveTimer = null;

function loadArtCache(){
  // one-time cleanup of the pre-v2 cache, which could hold divergent urls
  try{ localStorage.removeItem(ART_STORAGE_KEY_OLD); }catch(e){}
  try{
    const raw = localStorage.getItem(ART_STORAGE_KEY);
    if(!raw) return;
    const data = JSON.parse(raw);
    const now = Date.now();
    for(const k in data){
      const e = data[k];
      if(!e || (e.t && now - e.t > ART_TTL)) continue;   // expired
      // only restore entries that actually resolved to something useful
      if(e.i || e.d){
        artCache[k] = { itunes: e.i || null, deezer: e.d || null, itunesFailed:false, savedAt: e.t || now };
      }
    }
  }catch(err){ /* storage unavailable or corrupt — start fresh */ }
}

function saveArtCache(){
  // debounce: covers resolve in bursts, so batch the writes
  if(artSaveTimer) return;
  artSaveTimer = setTimeout(()=>{
    artSaveTimer = null;
    const now = Date.now();
    // build entries, preserving each one's original save time so eviction is fair
    let entries = [];
    for(const k in artCache){
      const e = artCache[k];
      if(!e) continue;
      if(e.itunes || e.deezer){
        entries.push([k, { i:e.itunes||"", d:e.deezer||"", t: e.savedAt || now }]);
      }
    }
    const write = list=>{
      const out = {};
      list.forEach(([k,v])=>{ out[k]=v; });
      localStorage.setItem(ART_STORAGE_KEY, JSON.stringify(out));
    };
    try{
      write(entries);
    }catch(err){
      // Quota exceeded: evict oldest entries and retry, rather than losing everything.
      entries.sort((a,b)=> a[1].t - b[1].t);   // oldest first
      let ok = false;
      for(let i=0; i<6 && !ok; i++){
        entries = entries.slice(Math.ceil(entries.length*0.25));  // drop oldest 25%
        if(!entries.length) break;
        try{ write(entries); ok = true; }catch(e2){ /* still too big — drop more */ }
      }
      if(!ok){ try{ localStorage.removeItem(ART_STORAGE_KEY); }catch(e3){} }
    }
  }, 1500);
}

/* Artist comparison.
   Deezer's field:"value" syntax breaks on "&", so we strip it from queries —
   which turned "Hall & Oates" into "Hall Oates" and then failed to match
   Deezer's "Hall & Oates". Collapsing "&" and "and" to the same form (and
   ignoring feat./ft.) fixes those false rejections. */
/* Some catalogues list an artist under a different name than this library
   does. Matching correctly rejects those, so map the known aliases instead
   of loosening the match (which would risk pulling the wrong cover).
   NOTE: keys must be in artistKey() form — "&" is normalised to "and". */
const ARTIST_ALIASES = {
  "hallandoates": ["darylhallandjohnoates"],
  "machinegunkellyandblackbear": ["mgk", "machinegunkelly"],
  "machinegunkelly": ["mgk"],
  "kanye": ["kanyewest"],
  "kidcudiandkanye": ["kidcudi"],
};
function artistKey(a){
  return (a||"")
    .toLowerCase()
    .replace(/&/g, " and ")
    .replace(/\bfeat\.?\b|\bft\.?\b|\bfeaturing\b/g, " ")
    .replace(/[^a-z0-9]/g, "");
}
function artistMatches(want, got){
  const w = artistKey(want), g = artistKey(got);
  if(!w || !g) return false;
  if(g.includes(w) || w.includes(g)) return true;
  const aliases = ARTIST_ALIASES[w] || [];
  return aliases.some(a => g.includes(a) || a.includes(g));
}

/* Cover art: run iTunes AND Deezer in parallel. Deezer usually returns
   first and is shown immediately as a placeholder; when iTunes resolves it
   upgrades the image (iTunes tends to be the more consistent source).
   artCache[key] = { itunes, deezer, best } where best is what to display. */
// Deezer is primary now, so prefer it; iTunes only fills gaps Deezer left.
function bestUrl(entry){ return (entry && (entry.deezer || entry.itunes)) || ""; }

function fetchArt(song){
  // returns the current best URL (may be upgraded later via onArtUpdate)
  return new Promise(resolve=>{
    const key = artKey(song);
    const entry = artCache[key];
    // already have the best possible result (iTunes) — use it, no lookups needed
    if(entry && entry.itunes){ resolve(entry.itunes); return; }
    // both sources have reported back (even if empty) — nothing more to fetch
    if(entry && entry.itunes!=null && entry.deezer!=null){ resolve(bestUrl(entry)); return; }
    if(artWaiters[key]){ artWaiters[key].push(resolve); }
    else artWaiters[key] = [resolve];
    if(!entry){
      artCache[key] = { itunes:null, deezer:null };
      // Deezer is the primary source: it's far more reliable and much less
      // rate-limited than iTunes (measured: 8 rapid calls, 0 failures, while
      // iTunes was hard-blocking every request). Fire Deezer immediately.
      deezerLookup(song, key);
      // iTunes runs only as a GAP-FILLER, once Deezer has had its chance --
      // it still covers ~29 songs Deezer doesn't have, so we don't drop it,
      // but it no longer competes for the critical path.
      queueItunesGapFill(song, key);
    } else {
      // partially cached (e.g. restored Deezer-only from storage): fetch just what's missing
      if(entry.deezer==null){ entry.deezer=null; deezerLookup(song, key); }
      if(entry.itunes==null){ entry.itunes=null; queueItunesGapFill(song, key); }
    }
  });
}

/* iTunes gap-fill: only look a song up on iTunes if Deezer failed to supply a
   cover for it. Waits for the Deezer result first, so the ~29 songs Deezer
   lacks still get art, while the other ~584 never spend an iTunes request. */
function queueItunesGapFill(song, key){
  const check = ()=>{
    const e = artCache[key];
    if(!e) return;
    if(e.deezer == null){ setTimeout(check, 700); return; }   // Deezer still pending
    if(e.deezer){ e.itunes = e.itunes==null ? "" : e.itunes; return; }  // Deezer covered it
    if(e.itunes != null) return;                              // already handled
    runLookup(song, key, 0);                                  // genuine gap -> ask iTunes
  };
  setTimeout(check, 700);
}

// notify UI when a better (iTunes) image arrives so it can swap in
const artUpdateListeners = {};   // key -> [fn(url)]
function onArtUpdate(key, fn){ (artUpdateListeners[key] = artUpdateListeners[key] || []).push(fn); }
function fireArtUpdate(key, url){ (artUpdateListeners[key]||[]).forEach(fn=>fn(url)); }

// record a result from a source; resolve waiters as soon as we have something,
// and push an upgrade if iTunes arrives after Deezer was already shown
function recordArt(key, source, url){
  let entry = artCache[key];
  if(!entry){ entry = artCache[key] = { itunes:null, deezer:null }; }
  // mark this source as attempted even if it returned nothing (empty string)
  entry[source] = url || "";
  if(source==="itunes"){ entry.itunesFailed = false; }   // settled (found or genuinely absent)
  const best = bestUrl(entry);
  // resolve any first-time waiters with the current best
  if(artWaiters[key]){
    artWaiters[key].forEach(fn=>fn(best));
    delete artWaiters[key];
  }
  // if iTunes just arrived with a real image, tell the UI to upgrade
  if(source==="itunes" && url){ fireArtUpdate(key, url); }
  if(url) { entry.savedAt = entry.savedAt || Date.now(); saveArtCache(); }   // persist resolved covers for instant load next visit
}

// record a TRANSIENT iTunes failure (timeout / network / rate-limit) so it can
// be retried later — this is what prevents songs getting permanently stuck on Deezer
function recordArtFail(key, source){
  let entry = artCache[key];
  if(!entry){ entry = artCache[key] = { itunes:null, deezer:null }; }
  if(source==="itunes"){
    entry.itunes = entry.itunes || "";   // keep any prior value; still counts as "responded" for waiters
    entry.itunesFailed = true;           // <-- flag for the retry sweep
  }
  // resolve first-time waiters with whatever we have (usually Deezer) so a cover still shows
  const best = bestUrl(entry);
  if(artWaiters[key]){
    artWaiters[key].forEach(fn=>fn(best));
    delete artWaiters[key];
  }
}

// Periodic sweep: find songs whose iTunes lookup failed transiently (not a real
// "not found") and re-queue them through the MAIN rate-limited queue, so all
// iTunes traffic flows through a single choke point and can't exceed the limit.
function sweepItunesRetries(){
  for(const key in artCache){
    const e = artCache[key];
    if(e && e.itunesFailed && !e.itunes){
      const song = SONGS.find(s=>artKey(s)===key);
      if(song){
        e.itunesFailed = false;        // clear so we don't re-queue repeatedly
        queueItunesRetry(song, key);   // goes through pumpQueue's pacing
      }
    }
  }
}
// retry queue drains through the same paced pumpQueue as everything else
const itunesRetryQueue = [];
function queueItunesRetry(song, key){
  if(itunesRetryQueue.some(j=>j.key===key)) return;
  itunesRetryQueue.push({song, key});
}
// run the retry sweep periodically (every ~90s); the actual requests are paced by pumpQueue
setInterval(()=>{ sweepItunesRetries(); if(typeof pumpQueue==='function') pumpQueue(); }, 90000);

function runLookup(song, key, attempt){
  const cb = "itc_" + (jsonpId++);
  // attempt 0: cleaned title + artist ; attempt 1: raw title + artist ; attempt 2: title only
  let term;
  if(attempt===0) term = cleanTitle(song.song) + " " + song.artist;
  else if(attempt===1) term = song.song + " " + song.artist;
  else term = cleanTitle(song.song);
  const script = document.createElement('script');
  let done=false;
  window[cb] = function(data){
    if(done) return;                 // ignore late/stale responses after timeout
    done=true; let url="";
    if(data && data.resultCount && data.results.length){
      const preferStudio = isLiveVersion(song);
      // keep only results whose artist genuinely matches
      const matches = data.results.filter(r=> artistMatches(song.artist, r.artistName));
      // score each candidate: higher is better
      const score = r=>{
        let sc = 0;
        const col = r.collectionName || "";
        if(preferStudio && (resultIsLive(col) || resultIsLive(r.trackName))) sc -= 100; // avoid live for live songs
        if(/-\s*single$/i.test(col) || /\bsingle$/i.test(col)) sc -= 20;                // prefer albums over singles
        if(/\bEP$/i.test(col)) sc -= 10;                                                // slight demote for EPs
        if(resultIsLive(col)) sc -= 5;                                                  // mild demote for live albums generally
        return sc;
      };
      const pick = matches.slice().sort((a,b)=>score(b)-score(a))[0];
      if(pick){
        url = (pick.artworkUrl100||"").replace("100x100","400x400");
      }
    }
    cleanup();
    if(!url && attempt<2){ runLookup(song, key, attempt+1); return; } // retry with a looser iTunes query
    // url found OR genuine "not found" (empty results) -> record as a settled result
    noteItunesSuccess();            // a real response: clear any backoff
    recordArt(key, "itunes", url);
  };
  function cleanup(){ try{delete window[cb];}catch(e){window[cb]=undefined;} if(script.parentNode) script.parentNode.removeChild(script); }
  // network error / blocked / rate-limited: mark as a TRANSIENT failure so it can be retried later
  script.onerror=function(){ if(!done){ done=true; cleanup(); noteItunesFailure(); if(attempt<2 && itunesAvailable()){ runLookup(song,key,attempt+1); } else { recordArtFail(key,"itunes"); } } };
  script.src = "https://itunes.apple.com/search?media=music&entity=song&limit=5&callback="+cb+"&term="+encodeURIComponent(term);
  document.body.appendChild(script);
  // timeout is also treated as transient (often a rate-limit stall), so it can be retried later
  setTimeout(()=>{ if(!done){ done=true; cleanup(); noteItunesFailure(); if(attempt<2 && itunesAvailable()){ runLookup(song,key,attempt+1); } else { recordArtFail(key,"itunes"); } } }, 8000);
}

/* Deezer fallback — free, no auth, JSONP-friendly. Only runs when iTunes
   found nothing for a song, so it doesn't multiply requests for songs that
   already have covers. Deezer returns album cover URLs in several sizes. */
/* Deezer cover lookups are throttled so we stay under Deezer's ~50-requests-
   per-5-seconds cap. Requests are queued and released ~1 every 130ms (≈7-8/s),
   well within the limit even with retries. A song that gets a rate-limit error
   is retried once after a short back-off. */
const dzQueue = [];
let dzInFlight = 0;
const DZ_MAX_CONCURRENT = 3;
const DZ_GAP_MS = 130;
let dzLastStart = 0;

function deezerLookup(song, key, attempt){
  dzQueue.push({song, key, attempt: attempt||0});
  pumpDeezer();
}
function pumpDeezer(){
  if(dzInFlight >= DZ_MAX_CONCURRENT || !dzQueue.length) return;
  const now = Date.now();
  const wait = Math.max(0, DZ_GAP_MS - (now - dzLastStart));
  setTimeout(()=>{
    if(dzInFlight >= DZ_MAX_CONCURRENT || !dzQueue.length) return;
    const job = dzQueue.shift();
    dzLastStart = Date.now();
    dzInFlight++;
    deezerLookupRaw(job.song, job.key, job.attempt);
    pumpDeezer();
  }, wait);
}
function deezerDone(){ dzInFlight = Math.max(0, dzInFlight-1); pumpDeezer(); }

/* Last-resort cover: an artist's photo from Deezer.
   Only used when no track/album art exists anywhere (e.g. the artist is in
   Deezer's catalogue but has no tracks). Matching is deliberately STRICT —
   a loose search for "Hypernova" also returns "HyperNoiz", "HyperBoat" etc,
   and a wrong band's photo is worse than a plain placeholder. */
function deezerArtistPhoto(song, key){
  const cb = "dza2_" + (jsonpId++);
  const clean = v => (v||"").replace(/["&]/g," ").replace(/\s+/g," ").trim();
  const script = document.createElement('script');
  let done = false;
  window[cb] = function(data){
    if(done) return;
    done = true;
    let url = "";
    const list = (data && data.data) ? data.data : [];
    // require an exact normalised name match, not just a fuzzy contains
    const want = artistKey(song.artist);
    const exact = list.find(a => artistKey(a.name) === want);
    if(exact){ url = exact.picture_xl || exact.picture_big || exact.picture_medium || ""; }
    cleanup();
    recordArt(key, "deezer", url);   // "" if still nothing -> placeholder stays
  };
  function cleanup(){ try{delete window[cb];}catch(e){window[cb]=undefined;} if(script.parentNode) script.parentNode.removeChild(script); }
  script.onerror = function(){ if(!done){ done=true; cleanup(); recordArt(key,"deezer",""); } };
  script.src = "https://api.deezer.com/search/artist?output=jsonp&callback="+cb+"&q="+encodeURIComponent(clean(song.artist));
  document.body.appendChild(script);
  setTimeout(()=>{ if(!done){ done=true; cleanup(); recordArt(key,"deezer",""); } }, 8000);
}

function deezerLookupRaw(song, key, attempt){
  const cb = "dzc_" + (jsonpId++);
  attempt = attempt || 0;
  // strip characters that break Deezer's field:"value" query syntax (quotes, &, etc.)
  const clean = v => (v||"").replace(/["&]/g," ").replace(/\s+/g," ").trim();
  // attempt 0/1: strict field query. attempt 2: relaxed plain-text search —
  // the strict form returns nothing for some artists (e.g. names with "&"),
  // whereas a plain query finds them; artistMatches() still guards accuracy.
  const q = (attempt >= 2)
    ? `${clean(song.artist)} ${clean(cleanTitle(song.song))}`
    : `artist:"${clean(song.artist)}" track:"${clean(cleanTitle(song.song))}"`;
  const script = document.createElement('script');
  let done=false;
  window[cb] = function(data){
    if(done) return;                 // ignore late/stale responses
    done=true; let url="";
    // Deezer signals throttling with an error object; retry once after a back-off
    if(data && data.error && /limit|quota/i.test((data.error.message||data.error.type||""))){
      cleanup(); deezerDone();
      if(attempt < 1){ setTimeout(()=>deezerLookup(song, key, attempt+1), 1500); }
      else { recordArt(key,"deezer",""); }
      return;
    }
    const list = (data && data.data) ? data.data : [];
    if(list.length){
      const preferStudio = isLiveVersion(song);
      const matches = list.filter(r=> artistMatches(song.artist, (r.artist && r.artist.name)));
      const score = r=>{
        let sc = 0;
        const albTitle = (r.album && r.album.title) || "";
        const albType  = (r.album && r.album.record_type) || "";  // "album" | "single" | "ep" | "compile"
        if(preferStudio && (resultIsLive(r.title) || resultIsLive(albTitle))) sc -= 100;
        if(/single/i.test(albType)) sc -= 20;                       // prefer albums over singles
        if(/ep/i.test(albType)) sc -= 10;
        if(resultIsLive(albTitle)) sc -= 5;
        return sc;
      };
      const pick = matches.slice().sort((a,b)=>score(b)-score(a))[0];
      if(pick && pick.album){
        url = pick.album.cover_xl || pick.album.cover_big || pick.album.cover_medium || pick.album.cover || "";
      }
    }
    cleanup(); deezerDone();
    // No usable match from the strict field query? Try once more with the
    // relaxed plain-text form before declaring a miss.
    if(!url && attempt < 2){ deezerLookup(song, key, 2); return; }
    // Still nothing: some artists exist on Deezer with no tracks at all, so no
    // album art can ever be found. Fall back to their artist photo rather than
    // showing a bare placeholder.
    if(!url){ deezerArtistPhoto(song, key); return; }
    recordArt(key, "deezer", url);   // Deezer result (may be "" ) — shown as placeholder until iTunes upgrades
  };
  function cleanup(){ try{delete window[cb];}catch(e){window[cb]=undefined;} if(script.parentNode) script.parentNode.removeChild(script); }
  script.onerror=function(){ if(!done){ done=true; cleanup(); deezerDone(); recordArt(key,"deezer",""); } };
  script.src = "https://api.deezer.com/search?output=jsonp&callback="+cb+"&q="+encodeURIComponent(q);
  document.body.appendChild(script);
  setTimeout(()=>{ if(!done){ done=true; cleanup(); deezerDone(); recordArt(key,"deezer",""); } }, 8000);
}

/* ---- Genre filling via Deezer (separate from the iTunes cover pipeline so
   they don't share a rate limit). Deezer's track search returns an album id;
   the album endpoint returns a genre name we map onto your existing tags. ---- */
const DEEZER_GENRE_MAP = {
  "rock":"Rock","pop":"Pop/Dance/Electronic","dance":"Pop/Dance/Electronic","electro":"Pop/Dance/Electronic",
  "alternative":"Alternative","indie":"Indie Rock","punk":"Punk","metal":"Metal","hard rock":"Metal",
  "rap/hip hop":"Hip-Hop/Rap","rap":"Hip-Hop/Rap","hip hop":"Hip-Hop/Rap",
  "r&b":"R&B/Soul/Funk","soul":"R&B/Soul/Funk","funk":"R&B/Soul/Funk","reggae":"Reggae/Ska",
  "country":"Country","folk":"Country","blues":"Classic Rock",
};
function mapDeezerGenre(name){
  if(!name || name==="Unknown") return null;
  const k=name.trim().toLowerCase();
  if(k in DEEZER_GENRE_MAP) return DEEZER_GENRE_MAP[k];
  for(const key in DEEZER_GENRE_MAP){ if(k.includes(key)) return DEEZER_GENRE_MAP[key]; }
  // fall back to the Apple map which covers more names
  return mapAppleGenre(name);
}

const genreQueue = [];
let genreIdx = 0, genreInFlight = false, lastGenreCall = 0;
const GENRE_RATE_MS = 2600;   // Deezer, independent of iTunes

function pumpGenre(){
  if(genreInFlight) return;
  // find next song still needing a genre OR a year
  let song=null;
  while(genreIdx < SONGS.length){
    const s = SONGS[genreIdx++];
    const needsGenre = (s.genres.length===1 && s.genres[0]==="N/A");
    const needsYear = !(s.year||"").trim();
    if(needsGenre || needsYear){ song=s; break; }
  }
  if(!song){ return; }
  const wait = Math.max(0, GENRE_RATE_MS - (Date.now()-lastGenreCall));
  genreInFlight=true;
  let settled=false;
  const finish=()=>{ if(settled) return; settled=true; genreInFlight=false; pumpGenre(); };
  setTimeout(()=>{ lastGenreCall=Date.now(); deezerGenreLookup(song, finish); setTimeout(finish, 12000); }, wait);
}

function deezerGenreLookup(song, finish){
  const cb="dzg_"+(jsonpId++);
  const clean=v=>(v||"").replace(/["&]/g," ").replace(/\s+/g," ").trim();
  const q=`artist:"${clean(song.artist)}" track:"${clean(cleanTitle(song.song))}"`;
  const script=document.createElement('script');
  let done=false;
  window[cb]=function(data){
    if(done) return; done=true;
    const list=(data&&data.data)?data.data:[];
    const want=song.artist.toLowerCase().replace(/[^a-z0-9]/g,"");
    const pick=list.find(r=>{
      const got=((r.artist&&r.artist.name)||"").toLowerCase().replace(/[^a-z0-9]/g,"");
      return got&&want&&(got.includes(want)||want.includes(got));
    });
    cleanup();
    if(pick && pick.album && pick.album.id){
      // grab year from the track's release_date if present (album fetch will confirm)
      const trackYear = (pick.release_date||"").slice(0,4);
      fetchDeezerAlbumInfo(pick.album.id, song, finish, trackYear);
    } else { finish(); }
  };
  function cleanup(){ try{delete window[cb];}catch(e){window[cb]=undefined;} if(script.parentNode) script.parentNode.removeChild(script); }
  script.onerror=function(){ if(!done){ done=true; cleanup(); finish(); } };
  script.src="https://api.deezer.com/search?output=jsonp&callback="+cb+"&q="+encodeURIComponent(q);
  document.body.appendChild(script);
}

function fetchDeezerAlbumInfo(albumId, song, finish, trackYear){
  const cb="dza_"+(jsonpId++);
  const script=document.createElement('script');
  let done=false;
  window[cb]=function(data){
    if(done) return; done=true;
    let name=null;
    if(data && data.genres && data.genres.data && data.genres.data.length){
      name=data.genres.data[0].name;
    }
    // year: prefer album release_date, fall back to the track's release year
    let year = (data && data.release_date ? String(data.release_date).slice(0,4) : "") || trackYear || "";
    cleanup();
    if(name){ applyDeezerGenre(song, name); }
    if(/^\d{4}$/.test(year)){ applyDeezerYear(song, year); }
    finish();
  };
  function cleanup(){ try{delete window[cb];}catch(e){window[cb]=undefined;} if(script.parentNode) script.parentNode.removeChild(script); }
  script.onerror=function(){ if(!done){ done=true; cleanup(); if(/^\d{4}$/.test(trackYear||"")){ applyDeezerYear(song, trackYear); } finish(); } };
  script.src="https://api.deezer.com/album/"+albumId+"?output=jsonp&callback="+cb;
  document.body.appendChild(script);
}

function applyDeezerYear(song, year){
  if((song.year||"").trim()) return;   // only fill missing years
  song.year = year;
  song._yearFilled = true;
  if(!genreFillPending){
    genreFillPending=true;
    setTimeout(()=>{ genreFillPending=false; if(!overlay.classList.contains('open')){ rebuildGenreDropdown(); render(); } }, 1500);
  }
}

function applyDeezerGenre(song, deezerGenreName){
  if(!(song.genres && song.genres.length===1 && song.genres[0]==="N/A")) return;
  const mapped=mapDeezerGenre(deezerGenreName);
  if(!mapped) return;
  song.genres=[mapped];
  song._genreFilled=true;
  if(!genreFillPending){
    genreFillPending=true;
    setTimeout(()=>{ genreFillPending=false; if(!overlay.classList.contains('open')){ rebuildGenreDropdown(); render(); } }, 1500);
  }
}

function phColor(song){ let h=0; const k=artKey(song); for(let i=0;i<k.length;i++) h=(h*31+k.charCodeAt(i))>>>0; return PH_COLORS[h%PH_COLORS.length]; }
function phLetter(song){ return (song.artist||song.song||"?").trim().charAt(0).toUpperCase(); }
function coverPlaceholder(song, cls){
  return `<div class="${cls}" data-artid="${song._id}" style="background:${phColor(song)}">${esc(phLetter(song))}</div>`;
}

/* lazy-load list covers */
let io;
const shownArt = {};   // songId -> the url we've committed to showing (keeps row & card identical)
function observeCovers(){
  if(io) io.disconnect();
  io = new IntersectionObserver(entries=>{
    entries.forEach(en=>{
      if(!en.isIntersecting) return;
      const ph=en.target;
      const id=+ph.getAttribute('data-artid');
      const song=SONGS[id];
      io.unobserve(ph);
      prioritize(song);
      const key = artKey(song);

      // helper: swap every on-page element for this song to the given url
      // (both the desktop table cell AND the mobile card share this data-artid).
      // We record the chosen url per song so the row and its twin card always
      // show the SAME image — previously each could resolve fetchArt() at a
      // different moment and capture different urls (Deezer vs iTunes gap-fill),
      // which made list and card covers diverge.
      const showUrl = (url)=>{
        if(!url) return;
        shownArt[id] = url;                        // remember what we committed to
        const img=new Image();
        img.onload=()=>{
          const els = document.querySelectorAll(`#main [data-artid="${id}"]`);
          els.forEach(el=>{
            const want = shownArt[id] || url;       // always use the committed url
            if(el.tagName==='IMG' && el.getAttribute('src')===want) return;
            // convert the PLACEHOLDER class to its matching IMAGE class
            // (e.g. "cover-ph" -> "cover", "sl-cover-ph" -> "sl-cover").
            const cls = el.className.replace(/-ph\b/g, '').trim() || 'cover';
            el.outerHTML = `<img class="${cls}" src="${want}" alt="${esc(song.song)} cover" data-artid="${id}" data-src="deezer">`;
          });
        };
        img.src=url;
      };

      // If this song's cover was already resolved (e.g. its twin row/card was
      // shown, or we returned to this view), reuse that exact url immediately
      // so both twins always match. Otherwise fetch it.
      if(shownArt[id]){
        showUrl(shownArt[id]);
      } else {
        fetchArt(song).then(showUrl);
        // when iTunes gap-fills a song Deezer lacked, upgrade to it — but only
        // if we haven't already committed to a Deezer image for it
        onArtUpdate(key, (itunesUrl)=>{ if(!shownArt[id]) showUrl(itunesUrl); });
      }
    });
  }, {rootMargin:"1200px"});
  document.querySelectorAll('#main .cover-ph').forEach(el=>io.observe(el));
}

function buildFilters(){
  const el=document.getElementById('filters'); el.innerHTML="";
  GAMES.forEach(g=>{
    if(!SONGS.some(s=>s.games.includes(g.code))) return;
    const chip=document.createElement('button');
    chip.className='game-chip'; chip.dataset.game=g.code; chip.dataset.active="false";
    chip.innerHTML=`<span class="chip-full">${g.label}</span><span class="chip-short">${g.code}</span>`;
    chip.title=g.label;
    chip.onclick=()=>{ state.games.has(g.code)?state.games.delete(g.code):state.games.add(g.code); chip.dataset.active=state.games.has(g.code)?"true":"false"; render(); };
    el.appendChild(chip);
  });
  // heart toggle: show only liked songs
  const heart=document.createElement('button');
  heart.className='liked-toggle'; heart.id='likedToggle';
  heart.dataset.active=state.likedOnly?"true":"false";
  heart.innerHTML=`${heartSvg('lt-icon')} Liked`;
  heart.title="Show only liked songs";
  heart.onclick=()=>{ state.likedOnly=!state.likedOnly; heart.dataset.active=state.likedOnly?"true":"false"; render(); };
  el.appendChild(heart);
  const genres=[...new Set(SONGS.flatMap(s=>s.genres||[]))].sort((a,b)=> a==="N/A"?1 : b==="N/A"?-1 : a.localeCompare(b));
  const sel=document.createElement('select');
  sel.innerHTML='<option value="">All genres</option>'+genres.map(g=>`<option value="${esc(g)}">${esc(g)}</option>`).join("");
  sel.onchange=e=>{ state.genre=e.target.value; render(); };
  el.appendChild(sel);
  const clear=document.createElement('button');
  clear.className='clear-btn'; clear.textContent='Clear all';
  clear.onclick=()=>{ state.q="";state.games.clear();state.genre="";state.likedOnly=false;document.getElementById('search').value="";sel.value="";el.querySelectorAll('.game-chip').forEach(c=>c.dataset.active="false");const h=document.getElementById('likedToggle');if(h){h.dataset.active="false";}render(); };
  el.appendChild(clear);
}

/* Clear every cover cache and re-fetch from scratch. */
function resetCovers(){
  try{ localStorage.removeItem(ART_STORAGE_KEY); }catch(e){}
  try{ localStorage.removeItem(ART_STORAGE_KEY_OLD); }catch(e){}
  // wipe in-memory state
  for(const k in artCache) delete artCache[k];
  for(const k in shownArt) delete shownArt[k];
  for(const k in artUpdateListeners) delete artUpdateListeners[k];
  // reset the sweep so it re-scans from the top
  dzSweepIdx = 0; bgIdx = 0;
  itunesFailStreak = 0; itunesPausedUntil = 0;
  render();                 // re-render placeholders, which re-observe & re-fetch
  if(typeof dzSweep==='function') dzSweep();
  if(typeof pumpQueue==='function') pumpQueue();
}

function filtered(){
  const q=state.q.toLowerCase();
  return SONGS.filter(s=>{
    if(state.likedOnly && !isLiked(s._id)) return false;
    if(state.games.size && !s.games.some(g=>state.games.has(g))) return false;
    if(state.genre && !(s.genres||[]).includes(state.genre)) return false;
    if(!q) return true;
    return s.song.toLowerCase().includes(q)||s.artist.toLowerCase().includes(q)||(s.genres||[]).join(" ").toLowerCase().includes(q)
        || s.games.some(code=>{const g=GAMES.find(x=>x.code===code);return g&&g.label.toLowerCase().includes(q);});
  });
}
function gems(s,key){
  const n=s.diff[key]; if(n===null||n===undefined) return "";
  const inst=INSTRUMENTS.find(i=>i.key===key); let dots="";
  for(let i=1;i<=6;i++) dots+=`<span class="gem ${i<=n?'filled':''}" style="--gem-color:${inst.color}"></span>`;
  return `<div class="instr-row"><span class="instr-label">${inst.label}</span><span class="gems">${dots}</span></div>`;
}
function allGems(s){ return INSTRUMENTS.map(i=>gems(s,i.key)).join(""); }
function badges(s){ return `<div class="game-badges">`+s.games.map(c=>`<span class="game-badge" style="--bc:var(--${c})">${c}</span>`).join("")+`</div>`; }
function genreList(s){ return (s.genres||[]).filter(g=>g!=="N/A").length ? (s.genres||[]).join(", ") : "N/A"; }
function genreSort(s){ const g=(s.genres||[]).filter(x=>x!=="N/A"); return (g[0]||"zzzz").toLowerCase(); }

let currentRows = [];
let shown = 0;
const PAGE = 60;   // render this many rows at a time to keep the DOM light
function render(){
  state.q=document.getElementById('search').value.trim();
  let rows=filtered();
  const {col,dir}=state.sort;
  rows.sort((a,b)=>{
    if(col==='year'){ return ((parseInt(a.year)||0)-(parseInt(b.year)||0))*dir; }
    if(col==='genre'){ return genreSort(a).localeCompare(genreSort(b))*dir; }
    return (a[col]||"").toLowerCase().localeCompare((b[col]||"").toLowerCase())*dir;
  });
  currentRows = rows;
  updateRandomLabel();
  shown = 0; // reset paging on every fresh render
  document.getElementById('meta').innerHTML=`<span>Showing ${rows.length} of ${SONGS.length} songs</span><span></span>`;
  const main=document.getElementById('main');
  if(!rows.length){ main.innerHTML=`<div class="empty"><div class="big">No matches</div><p>Nothing matches that search. Try a different title or artist, or clear your filters.</p></div>`; return; }

  const cols=[{key:'song',label:'Song'},{key:'artist',label:'Artist'},{key:'year',label:'Year'},{key:'genre',label:'Genre'}];
  const thead="<thead><tr><th class='noclick'></th>"+cols.map(c=>{const a=state.sort.col===c.key;return `<th data-col="${c.key}" class="${a?'active':''}">${c.label}${a?(dir>0?' \u25b2':' \u25bc'):''}</th>`;}).join("")+"<th class='noclick'>Installed On</th><th class='noclick'>Difficulty</th><th class='noclick'></th></tr></thead>";
  // build shells once; rows get appended incrementally
  main.innerHTML=`<table>${thead}<tbody id="tbody"></tbody></table><div class="cards" id="cardsWrap"></div><div id="loadMoreWrap"></div>`;
  main.querySelectorAll('thead th[data-col]').forEach(th=>{ th.onclick=()=>{ const c=th.dataset.col; if(state.sort.col===c) state.sort.dir*=-1; else {state.sort.col=c;state.sort.dir=1;} render(); }; });
  appendRows();
}

function rowHtml(s){
  return `<tr data-id="${s._id}"><td>${coverPlaceholder(s,'cover-ph')}</td><td class="title-cell">${esc(s.song)}</td><td class="sub-cell">${esc(s.artist)}</td><td class="mono">${esc(s.year)}</td><td class="mono">${esc(genreList(s))}</td><td>${badges(s)}</td><td>${allGems(s)}</td><td class="action-cell"><div class="action-stack">${likeBtnHtml(s)}${addBtnHtml(s)}</div></td></tr>`;
}
function cardHtml(s){
  return `<div class="card" data-id="${s._id}">${coverPlaceholder(s,'cover-ph')}<div class="card-body"><div class="title">${esc(s.song)}</div><div class="artist">${esc(s.artist)}</div><div class="meta-row">${s.year?`<span>${esc(s.year)}</span>`:""}<span>${esc(genreList(s))}</span></div><div class="badges-wrap">${badges(s)}</div><div class="instruments">${allGems(s)}</div><div class="card-actions">${likeBtnHtml(s)}${addBtnHtml(s)}</div></div></div>`;
}
function addBtnHtml(s){
  const inList = activeSetlist() && activeSetlist().songs.includes(s._id);
  return `<button class="add-btn${inList?' added':''}" data-add="${s._id}" onclick="toggleInSetlist(event, ${s._id})">${inList?'✓ Added':'+ Add'}</button>`;
}
function heartSvg(cls){
  // symmetric heart path with padding in the viewBox so the stroke isn't clipped
  return `<svg class="heart-svg ${cls||''}" viewBox="-2 -2 36 33" aria-hidden="true"><path d="M16 28.26C6.4 21.29 0 15.44 0 9.34 0 4.42 3.86 1 8.15 1c2.98 0 5.86 1.62 7.85 4.53C17.99 2.62 20.87 1 23.85 1 28.14 1 32 4.42 32 9.34c0 6.1-6.4 11.95-16 18.92z"/></svg>`;
}
function likeBtnHtml(s){
  const liked=isLiked(s._id);
  return `<button class="like-btn${liked?' liked':''}" data-like="${s._id}" title="${liked?'Unlike':'Like'}" onclick="toggleLike(event, ${s._id})">${heartSvg('')}</button>`;
}
function appendRows(){
  const next = currentRows.slice(shown, shown+PAGE);
  shown += next.length;
  const tb=document.getElementById('tbody'); const cw=document.getElementById('cardsWrap');
  if(tb) tb.insertAdjacentHTML('beforeend', next.map(rowHtml).join(""));
  if(cw) cw.insertAdjacentHTML('beforeend', next.map(cardHtml).join(""));
  // wire clicks on just-added rows
  next.forEach(s=>{
    document.querySelectorAll(`[data-id="${s._id}"]`).forEach(el=>{
      if(el._wired) return; el._wired=true;
      el.addEventListener('click', e=>{ if(e.target.closest('th')) return; openDetail(+el.getAttribute('data-id')); });
    });
  });
  // load-more control
  const lm=document.getElementById('loadMoreWrap');
  if(lm){
    if(shown < currentRows.length){
      lm.innerHTML=`<div style="text-align:center;padding:24px;"><button id="loadMoreBtn" style="font-family:'Archivo','Inter',sans-serif;font-size:14px;font-weight:600;padding:12px 24px;border-radius:10px;border:1px solid var(--hairline);background:var(--bg-card);color:var(--text);cursor:pointer;">Load more (${currentRows.length-shown} left)</button></div>`;
      document.getElementById('loadMoreBtn').onclick=appendRows;
    } else { lm.innerHTML=""; }
  }
  observeCovers();
}

/* ---------- DETAIL PAGE ---------- */
const overlay=document.getElementById('detailOverlay');
const detailContent=document.getElementById('detailContent');
function openDetail(id){
  interactingUntil = Date.now() + 60000; // hold background sweep while viewing a song
  const s=SONGS[id];
  const chartable=INSTRUMENTS.filter(i=>s.diff[i.key]!==null && s.diff[i.key]!==undefined);
  const diffCards=INSTRUMENTS.map(inst=>{
    const n=s.diff[inst.key];
    const na = (n===null||n===undefined);
    let pips="";
    for(let i=1;i<=6;i++) pips+=`<div class="dc-pip ${(!na&&i<=n)?'on':''}" style="--dc-color:${inst.color}"></div>`;
    return `<div class="diff-card ${na?'na':''}"><div class="dc-head"><span class="dc-name">${inst.label}</span><span class="dc-num">${na?'Not charted':(n+' / 6')}</span></div><div class="dc-bar">${pips}</div></div>`;
  }).join("");
  const metaItems=[
    ["Year", s.year], ["Genre", genreList(s)], ["Origin / Source", s.origin],
    ["Installed on", s.games.join(", ")], ["Playable parts", chartable.length+" instrument"+(chartable.length===1?'':'s')]
  ].filter(m=>m[1]).map(m=>`<div class="meta-item"><div class="k">${m[0]}</div><div class="v">${esc(String(m[1]))}</div></div>`).join("");

  detailContent.innerHTML = `
    <div class="detail-banner">
      <div class="detail-banner-bg" id="detailBg"></div>
      ${coverPlaceholder(s,'detail-cover-ph')}
      <div class="detail-titles">
        <div class="eyebrow">Song Details</div>
        <h2>${esc(s.song)}</h2>
        <div class="artist">${esc(s.artist)}</div>
      </div>
    </div>
    <div class="detail-body">
      <div class="detail-badges">${s.games.map(c=>{const g=GAMES.find(x=>x.code===c);return `<span class="game-badge" style="--bc:var(--${c})" title="${g?esc(g.label):''}">${c}</span>`;}).join("")}</div>
      <p class="detail-section-label">Track Info</p>
      <div class="meta-grid">${metaItems}</div>
      <p class="detail-section-label">Difficulty by Instrument</p>
      <div class="diff-grid">${diffCards}</div>
      <div class="detail-nav">
        <button id="detailPrev">\u2190 Previous</button>
        <button class="rand" id="detailRandom">🎲 Random song</button>
        <button id="detailNext">Next \u2192</button>
      </div>
    </div>`;

  // load cover for banner + main art (bump to front of queue), upgrade to iTunes later
  prioritize(s);
  const dkey = artKey(s);
  const showDetailUrl = (url)=>{
    if(!url) return;
    const img=new Image();
    img.onload=()=>{
      const ph=detailContent.querySelector('.detail-cover-ph, img.detail-cover');
      // only replace if this detail view is still showing the same song
      if(ph && detailContent.dataset.songid===String(id)){
        const isItunes = artCache[dkey] && artCache[dkey].itunes===url;
        if(ph.tagName==='IMG' && ph.dataset.src==='itunes' && !isItunes) return; // don't downgrade
        ph.outerHTML = `<img class="detail-cover" src="${url}" alt="${esc(s.song)} cover" data-src="${isItunes?'itunes':'deezer'}">`;
      }
      const bg=document.getElementById('detailBg'); if(bg) bg.style.backgroundImage=`url("${url}")`;
    };
    img.src=url;
  };
  detailContent.dataset.songid = String(id);
  fetchArt(s).then(showDetailUrl);
  onArtUpdate(dkey, showDetailUrl);

  // nav wiring — move within current filtered list if present, else full list
  const list = currentRows.length ? currentRows : SONGS;
  let pos = list.findIndex(x=>x._id===id);
  document.getElementById('detailPrev').onclick=()=>{ const p=(pos-1+list.length)%list.length; openDetail(list[p]._id); };
  document.getElementById('detailNext').onclick=()=>{ const p=(pos+1)%list.length; openDetail(list[p]._id); };
  document.getElementById('detailRandom').onclick=()=>randomSong();

  overlay.classList.add('open');
  overlay.scrollTop=0;
  document.body.style.overflow='hidden';
}
function closeDetail(){ overlay.classList.remove('open'); document.body.style.overflow=''; interactingUntil = Date.now() + 500; setTimeout(pumpQueue, 600); }
document.getElementById('detailClose').onclick=closeDetail;
overlay.addEventListener('click', e=>{ if(e.target===overlay) closeDetail(); });
document.addEventListener('keydown', e=>{
  if(!overlay.classList.contains('open')) return;
  if(e.key==='Escape') closeDetail();
  else if(e.key==='ArrowLeft'){ const b=document.getElementById('detailPrev'); if(b) b.click(); }
  else if(e.key==='ArrowRight'){ const b=document.getElementById('detailNext'); if(b) b.click(); }
});

function updateRandomLabel(){

/* ============================================================
   SETLIST FEATURE — isolated from the browse/search mechanics.
   Setlists persist via localStorage (works once hosted), plus
   Export/Import for moving between devices.
   ============================================================ */
let setlists = [];        // [{id, name, songs:[songId,...]}]
let activeSetlistId = null;
let likedSongs = [];      // [songId,...]
const SL_STORAGE_KEY = "rbSetlists_v1";
const LIKED_STORAGE_KEY = "rbLikedSongs_v1";

function loadSetlists(){
  try{
    const raw = localStorage.getItem(SL_STORAGE_KEY);
    if(raw){ const d=JSON.parse(raw); setlists=d.setlists||[]; activeSetlistId=d.activeId||null; }
  }catch(e){ /* storage blocked (e.g. opened as file://) — stay in-memory */ }
  if(!setlists.length){ const id=slNewId(); setlists=[{id, name:"My Setlist", songs:[]}]; activeSetlistId=id; }
  if(!setlists.find(s=>s.id===activeSetlistId)) activeSetlistId=setlists[0].id;
  try{
    const raw2 = localStorage.getItem(LIKED_STORAGE_KEY);
    if(raw2){ likedSongs = JSON.parse(raw2) || []; }
  }catch(e){}
}
function saveSetlists(){
  try{ localStorage.setItem(SL_STORAGE_KEY, JSON.stringify({setlists, activeId:activeSetlistId})); }catch(e){}
  updateSetlistTabCount();
}
function saveLiked(){
  try{ localStorage.setItem(LIKED_STORAGE_KEY, JSON.stringify(likedSongs)); }catch(e){}
  updateLikedTabCount();
}
function isLiked(id){ return likedSongs.includes(id); }
function toggleLike(ev, songId){
  if(ev) ev.stopPropagation();
  const i=likedSongs.indexOf(songId);
  if(i>=0) likedSongs.splice(i,1); else likedSongs.push(songId);
  saveLiked();
  // update all heart buttons for this song
  document.querySelectorAll(`[data-like="${songId}"]`).forEach(btn=>{
    const liked=isLiked(songId);
    btn.classList.toggle('liked', liked);
    btn.title = liked ? 'Unlike' : 'Like';
  });
  // if the browse view is filtered to liked-only, refresh so unliked songs drop out
  if(currentTab==='browse' && state.likedOnly) render();
}
function updateLikedTabCount(){ /* liked is now a filter toggle, no tab count needed */ }
function slNewId(){ return "sl_"+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

/* Inline modal to replace browser prompt()/confirm().
   slPrompt(title, defaultValue) -> Promise<string|null>
   slConfirm(title, message)     -> Promise<boolean>            */
let slModalResolver=null;
function slCloseModal(result){
  const ov=document.getElementById('slModalOverlay');
  ov.classList.remove('open');
  const r=slModalResolver; slModalResolver=null;
  if(r) r(result);
}
function slPrompt(title, defVal){
  return new Promise(resolve=>{
    slModalResolver=resolve;
    document.getElementById('slModalTitle').textContent=title;
    document.getElementById('slModalMsg').textContent="";
    const inp=document.getElementById('slModalInput');
    inp.classList.remove('hidden');
    inp.value=defVal||"";
    document.getElementById('slModalOverlay').classList.add('open');
    document.getElementById('slModalOk').onclick=()=>{ const v=inp.value.trim(); slCloseModal(v||null); };
    setTimeout(()=>{ inp.focus(); inp.select(); },30);
  });
}
function slConfirm(title, message){
  return new Promise(resolve=>{
    slModalResolver=resolve;
    document.getElementById('slModalTitle').textContent=title;
    document.getElementById('slModalMsg').textContent=message||"";
    const inp=document.getElementById('slModalInput');
    inp.classList.add('hidden');
    document.getElementById('slModalOverlay').classList.add('open');
    document.getElementById('slModalOk').onclick=()=>slCloseModal(true);
  });
}
// shared modal controls
document.getElementById('slModalCancel').onclick=()=>slCloseModal(null);
document.getElementById('slModalOverlay').addEventListener('click',e=>{ if(e.target.id==='slModalOverlay') slCloseModal(null); });
document.getElementById('slModalInput').addEventListener('keydown',e=>{
  if(e.key==='Enter'){ e.preventDefault(); const v=e.target.value.trim(); slCloseModal(v||null); }
  else if(e.key==='Escape'){ slCloseModal(null); }
});
function activeSetlist(){ return setlists.find(s=>s.id===activeSetlistId) || null; }
function updateSetlistTabCount(){
  const sl=activeSetlist();
  const el=document.getElementById('setlistTabCount');
  if(el) el.textContent = sl && sl.songs.length ? sl.songs.length : "";
  populateActiveSelect();
}

// keep the "Adding to:" selector in the Browse view in sync
function populateActiveSelect(){
  const sel=document.getElementById('activeSetlistSelect');
  if(!sel) return;
  sel.innerHTML = setlists.map(x=>`<option value="${x.id}"${x.id===activeSetlistId?' selected':''}>${esc(x.name)} (${x.songs.length})</option>`).join("");
}

function removeFromSetlist(songId){
  const sl=activeSetlist(); if(!sl) return;
  const i=sl.songs.indexOf(songId);
  if(i<0) return;
  sl.songs.splice(i,1);
  saveSetlists();
  refreshAddButtons();
  renderSetlists();
}

// add/remove a song in the active setlist (called from the + Add buttons)
function toggleInSetlist(ev, songId){
  ev.stopPropagation();
  const sl=activeSetlist(); if(!sl) return;
  const i=sl.songs.indexOf(songId);
  if(i>=0){
    // already in the list — removing is destructive, so make it explicit rather
    // than a silent toggle that surprises people mid-build
    const s=SONGS[songId];
    slConfirm("Remove from setlist?", `"${s.song}" is already in "${sl.name}". Remove it?`).then(ok=>{
      if(!ok) return;
      const j=sl.songs.indexOf(songId);
      if(j>=0) sl.songs.splice(j,1);
      saveSetlists();
      refreshAddButtons();
      if(currentTab==='setlists') renderSetlists();
    });
    return;
  }
  sl.songs.push(songId);
  saveSetlists();
  refreshAddButtons();
  if(currentTab==='setlists') renderSetlists();
}

/* ---- setlist view rendering ---- */
function renderSetlists(){
  const v=document.getElementById('view-setlists');

  const options=setlists.map(x=>`<option value="${x.id}"${x.id===activeSetlistId?' selected':''}>${esc(x.name)} (${x.songs.length})</option>`).join("");
  let html=`<div class="sl-toolbar">
    <select class="sl-select" id="slSelect">${options}</select>
    <button class="sl-btn" id="slNew">+ New</button>
    <button class="sl-btn" id="slRename">Rename</button>
    <button class="sl-btn danger" id="slDelete">Delete</button>
    <button class="sl-btn" id="slShare">Share link</button>
    <button class="sl-btn" id="slExport">Export</button>
    <button class="sl-btn" id="slImport">Import</button>
  </div>`;

  if(!sl || !sl.songs.length){
    html+=`<div class="sl-empty"><div class="big">${sl?esc(sl.name):'No setlist'} is empty</div><p>Go to the <b>Browse</b> tab and tap <b>+ Add</b> on any song to build this setlist.</p></div>`;

    const gameStats=GAMES.filter(g=>perGame[g.code]).map(g=>`${g.code}: <b>${perGame[g.code]}</b>`).join(" · ");
    html+=`<div class="sl-stats"><span><b>${songs.length}</b> songs</span>${gameStats?`<span>${gameStats}</span>`:''}</div>`;
    html+=songs.map((s,idx)=>`<div class="sl-item" data-slrow="${s._id}" draggable="true">
      <span class="sl-grip" title="Drag to reorder">⠿</span>
      <span class="sl-num">${idx+1}</span>
      ${coverPlaceholder(s,'sl-cover-ph')}
      <div class="sl-info"><div class="t">${esc(s.song)}</div><div class="a">${esc(s.artist)}</div></div>
      <div class="sl-badges">${s.games.map(c=>`<span class="game-badge" style="--bc:var(--${c})">${c}</span>`).join("")}</div>
      <div class="sl-move"><button data-mv="up" data-id="${s._id}" title="Move up">▲</button><button data-mv="down" data-id="${s._id}" title="Move down">▼</button></div>
      <button class="sl-remove" data-rm="${s._id}" title="Remove">✕</button>
    </div>`).join("");
    v.innerHTML=html;
    // load covers for the setlist rows
    v.querySelectorAll('.sl-cover-ph').forEach(ph=>{
      const id=+ph.getAttribute('data-artid'); const song=SONGS[id];
      prioritize(song);
      fetchArt(song).then(url=>{ if(url){ const el=v.querySelector(`.sl-cover-ph[data-artid="${id}"]`); if(el){ const im=new Image(); im.onload=()=>{ const e2=v.querySelector(`.sl-cover-ph[data-artid="${id}"]`); if(e2) e2.outerHTML=`<img class="sl-cover" src="${url}" alt="">`; }; im.src=url; } } });
    });
    // wire move/remove
    v.querySelectorAll('[data-mv]').forEach(b=>b.onclick=()=>moveInSetlist(+b.dataset.id, b.dataset.mv));
    v.querySelectorAll('[data-rm]').forEach(b=>b.onclick=()=>{ removeFromSetlist(+b.dataset.rm); });
    wireSetlistDrag(v);
  }

  // toolbar wiring
  document.getElementById('slSelect').onchange=e=>{ activeSetlistId=e.target.value; saveSetlists(); renderSetlists(); refreshAddButtons(); };
  document.getElementById('slNew').onclick=async()=>{ const name=await slPrompt("Name this setlist","Setlist "+(setlists.length+1)); if(name){ const id=slNewId(); setlists.push({id,name:name.trim(),songs:[]}); activeSetlistId=id; saveSetlists(); renderSetlists(); refreshAddButtons(); } };
  document.getElementById('slRename').onclick=async()=>{ const sl=activeSetlist(); if(!sl)return; const name=await slPrompt("Rename setlist",sl.name); if(name){ sl.name=name.trim(); saveSetlists(); renderSetlists(); } };
  document.getElementById('slDelete').onclick=async()=>{ const sl=activeSetlist(); if(!sl)return; const ok=await slConfirm("Delete setlist?",`"${sl.name}" will be permanently deleted.`); if(!ok)return; setlists=setlists.filter(x=>x.id!==sl.id); if(!setlists.length){ const id=slNewId(); setlists=[{id,name:"My Setlist",songs:[]}]; activeSetlistId=id; } else activeSetlistId=setlists[0].id; saveSetlists(); renderSetlists(); refreshAddButtons(); };
  document.getElementById('slShare').onclick=shareSetlist;
  document.getElementById('slExport').onclick=exportSetlists;
  document.getElementById('slImport').onclick=importSetlists;
  updateSetlistTabCount();
}

/* drag-to-reorder for setlist rows (the up/down buttons still work as a fallback) */
function wireSetlistDrag(container){
  let dragId = null;
  container.querySelectorAll('.sl-item[draggable="true"]').forEach(row=>{
    row.addEventListener('dragstart', e=>{
      dragId = +row.dataset.slrow;
      row.classList.add('dragging');
      try{ e.dataTransfer.effectAllowed='move'; e.dataTransfer.setData('text/plain', String(dragId)); }catch(err){}
    });
    row.addEventListener('dragend', ()=>{
      dragId = null;
      container.querySelectorAll('.sl-item').forEach(r=>r.classList.remove('dragging','drop-above','drop-below'));
    });
    row.addEventListener('dragover', e=>{
      e.preventDefault();
      if(dragId==null || +row.dataset.slrow===dragId) return;
      const r = row.getBoundingClientRect();
      const below = (e.clientY - r.top) > r.height/2;
      row.classList.toggle('drop-below', below);
      row.classList.toggle('drop-above', !below);
    });
    row.addEventListener('dragleave', ()=>{ row.classList.remove('drop-above','drop-below'); });
    row.addEventListener('drop', e=>{
      e.preventDefault();
      const sl = activeSetlist(); if(!sl || dragId==null) return;
      const targetId = +row.dataset.slrow;
      if(targetId===dragId) return;
      const from = sl.songs.indexOf(dragId);
      if(from<0) return;
      const r = row.getBoundingClientRect();
      const below = (e.clientY - r.top) > r.height/2;
      sl.songs.splice(from,1);                       // remove from old position
      let to = sl.songs.indexOf(targetId);           // recompute after removal
      if(to<0) to = sl.songs.length-1;
      sl.songs.splice(below ? to+1 : to, 0, dragId); // insert at the drop point
      dragId = null;
      saveSetlists();
      renderSetlists();
    });
  });
}

function moveInSetlist(songId, dir){
  const sl=activeSetlist(); if(!sl)return;
  const i=sl.songs.indexOf(songId); if(i<0)return;
  const j = dir==='up'? i-1 : i+1;
  if(j<0||j>=sl.songs.length)return;
  [sl.songs[i],sl.songs[j]]=[sl.songs[j],sl.songs[i]];
  saveSetlists(); renderSetlists();
}

function refreshAddButtons(){
  const sl=activeSetlist();
  document.querySelectorAll('[data-add]').forEach(btn=>{
    const id=+btn.getAttribute('data-add');
